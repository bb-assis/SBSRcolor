<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBSR Adaptive Logo Tool</title>
  <style>
    :root{
      --bg:#f3f1ee;
      --panel:#ffffff;
      --text:#1f1f1f;
      --muted:#6d6d6d;
      --line:#dedad3;
      --red:#d62027;
      --black:#212121;
      --white:#e7e3de;
      --good:#2e7d32;
      --ok:#7cb342;
      --warn:#ef6c00;
      --bad:#c62828;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#f7f5f2 0%, #efebe5 100%);
      color:var(--text);
      padding:32px;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:24px;
    }
    .card{
      background:var(--panel);
      border:1px solid rgba(0,0,0,.05);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .left{
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    h1{
      font-size:24px;
      line-height:1.1;
      margin:0 0 6px 0;
      letter-spacing:-0.02em;
    }
    .sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      margin:0;
    }
    .field label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-bottom:8px;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
    }
    input[type="text"]{
      flex:1;
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px 14px;
      font-size:16px;
      outline:none;
    }
    input[type="color"]{
      width:54px;
      height:46px;
      border:none;
      padding:0;
      background:none;
      cursor:pointer;
    }
    button{
      border:none;
      border-radius:12px;
      padding:14px 16px;
      background:var(--black);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    .swatches{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .swatch{
      width:34px;
      height:34px;
      border-radius:999px;
      border:2px solid rgba(0,0,0,.08);
      cursor:pointer;
    }
    .mini{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
    .right{
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:18px;
      padding:18px;
    }
    .preview-shell{
      border-radius:18px;
      border:1px solid rgba(0,0,0,.06);
      overflow:hidden;
      background:#ddd;
      min-height:330px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }
    .preview-inner{
      width:100%;
      height:330px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:background .2s ease;
    }
    #logo{
      width:min(72%, 430px);
      height:auto;
      display:block;
      shape-rendering:geometricPrecision;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .panel{
      border:1px solid rgba(0,0,0,.06);
      border-radius:16px;
      padding:16px;
      background:#fff;
    }
    .panel h3{
      margin:0 0 10px 0;
      font-size:15px;
    }
    .choice{
      display:flex;
      align-items:center;
      gap:12px;
      margin-top:10px;
    }
    .chip{
      width:44px;
      height:44px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.09);
      flex:0 0 auto;
    }
    .choice strong{
      display:block;
      font-size:14px;
    }
    .choice span{
      color:var(--muted);
      font-size:13px;
    }
    .meter-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      gap:10px;
    }
    .meter{
      height:12px;
      background:#e8e3db;
      border-radius:999px;
      overflow:hidden;
    }
    .meter > div{
      height:100%;
      width:0%;
      background:var(--black);
      transition:all .25s ease;
    }
    .details{
      margin-top:10px;
      font-size:14px;
      line-height:1.6;
      color:#333;
    }
    .note{
      border-left:4px solid #d0cbc4;
      padding:10px 12px;
      background:#f7f4ef;
      border-radius:10px;
      font-size:13px;
      color:#4f4b45;
      line-height:1.5;
    }
    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      font-weight:700;
      background:#f1efe9;
      color:#333;
    }
    .dot{
      width:8px;height:8px;border-radius:999px;background:currentColor;
    }
    code{
      background:#f3f0ea;
      padding:2px 6px;
      border-radius:6px;
      font-size:12px;
    }
    @media (max-width: 900px){
      body{padding:16px}
      .wrap{grid-template-columns:1fr}
      .preview-inner{height:280px}
      .grid2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card left">
      <div>
        <h1>SBSR Adaptive Logo Tool</h1>
        
      </div>

      <div class="field">
        <label for="hexInput">Cor de fundo</label>
        <div class="row">
          <input id="hexInput" type="text" value="#3A7BD5" />
          <input id="colorInput" type="color" value="#3a7bd5" />
          <button id="runBtn">Analisar</button>
        </div>
      </div>

      <div class="field">
        <label>Swatches rápidos</label>
        <div class="swatches" id="swatches"></div>
      </div>
</section>

    <section class="card right">
      <div class="preview-shell">
        <div class="preview-inner" id="previewBg">
          <svg id="logo" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg" aria-label="SBSR logo preview">
            <g id="block1">
              <path d="M86 177c-20 0-36-16-36-36V76c0-20 16-36 36-36h78c20 0 36 16 36 36v65c0 20-16 36-36 36H86Zm0-26h78c5.5 0 10-4.5 10-10V76c0-5.5-4.5-10-10-10H86c-5.5 0-10 4.5-10 10v65c0 5.5 4.5 10 10 10Z"/>
              <circle cx="125" cy="108.5" r="23"/>
              <rect x="118" y="131" width="14" height="56" rx="7"/>
              <rect x="94" y="182" width="62" height="14" rx="7"/>
              <text x="244" y="102" font-size="46" font-weight="800" letter-spacing="-1.5" font-family="Arial, Helvetica, sans-serif">SUPER</text>
              <text x="244" y="153" font-size="46" font-weight="800" letter-spacing="-1.5" font-family="Arial, Helvetica, sans-serif">BOCK</text>
            </g>

            <g id="block2">
              <rect x="234" y="170" width="290" height="64" rx="10"/>
              <text x="258" y="214" font-size="42" font-weight="800" letter-spacing="-1.2" font-family="Arial, Helvetica, sans-serif">SUPER ROCK</text>
            </g>
          </svg>
        </div>
      </div>

      <div class="grid2">
        <div class="panel">
          <h3>Aplicação recomendada</h3>
          <div class="choice">
            <div class="chip" id="chip1"></div>
            <div>
              <strong>Bloco 1</strong>
              <span id="label1">-</span>
            </div>
          </div>
          <div class="choice">
            <div class="chip" id="chip2"></div>
            <div>
              <strong>Bloco 2</strong>
              <span id="label2">-</span>
            </div>
          </div>
          <div style="margin-top:14px">
            <span class="status" id="strategyBadge"><span class="dot"></span><span id="strategyText">-</span></span>
          </div>
        </div>

        <div class="panel">
          <div class="meter-head">
            <strong>Qualidade de contraste</strong>
            <span id="qualityLabel">-</span>
          </div>
          <div class="meter"><div id="qualityBar"></div></div>
          <div class="details" id="contrastDetails"></div>
        </div>
      </div>

      <div class="panel">
        <h3 style="margin-top:0">Nota</h3>
        <div class="details" id="noteText"></div>
      </div>
    </section>
  </div>

<script>
const COLORS = {
  red:   { hex: "#d62027", label: "Vermelho" },
  black: { hex: "#212121", label: "Preto" },
  white: { hex: "#e7e3de", label: "Branco" }
};

const PREFERRED = [
  ["white", "black"],
  ["red",   "black"],
  ["white", "red"]
];

const ALTERNATIVE = [
  ["black", "white"],
  ["black", "red"],
  ["red",   "white"]
];

const MONO = [
  ["black", "black"],
  ["white", "white"]
];

const QUICK_SWATCHES = [
  "#3A7BD5","#009688","#FF4FA3","#6E44FF","#F5D94B","#111111","#F3EEE6","#0D3B66","#35C759","#FF6B35"
];

function hexToRgb(hex) {
  const clean = normalizeHex(hex);
  const bigint = parseInt(clean.slice(1), 16);
  return {
    r: (bigint >> 16) & 255,
    g: (bigint >> 8) & 255,
    b: bigint & 255
  };
}

function normalizeHex(hex) {
  let h = String(hex).trim();
  if (!h.startsWith("#")) h = "#" + h;
  if (h.length === 4) h = "#" + h.slice(1).split("").map(c => c + c).join("");
  return h.toLowerCase();
}

function isValidHex(hex) {
  return /^#([0-9a-f]{6})$/i.test(normalizeHex(hex));
}

function luminance(r, g, b) {
  const a = [r, g, b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
}

function contrast(bgHex, fgHex) {
  const rgb1 = hexToRgb(bgHex);
  const rgb2 = hexToRgb(fgHex);
  const L1 = luminance(rgb1.r, rgb1.g, rgb1.b);
  const L2 = luminance(rgb2.r, rgb2.g, rgb2.b);
  const bright = Math.max(L1, L2);
  const dark = Math.min(L1, L2);
  return (bright + 0.05) / (dark + 0.05);
}

function classify(contrastA, contrastB) {
  const minC = Math.min(contrastA, contrastB);
  const maxC = Math.max(contrastA, contrastB);

  if (minC >= 4.5) return { label: "Excelente", value: 100, color: "#2e7d32", critical: false };
  if (maxC >= 4.5 && minC >= 3) return { label: "Bom", value: 75, color: "#7cb342", critical: false };
  if (minC >= 3) return { label: "Sensível", value: 50, color: "#ef6c00", critical: false };
  return { label: "Crítico", value: 25, color: "#c62828", critical: true };
}

function evaluatePair(bg, c1, c2, strategy) {
  const contrast1 = contrast(bg, COLORS[c1].hex);
  const contrast2 = contrast(bg, COLORS[c2].hex);
  const quality = classify(contrast1, contrast2);
  const minC = Math.min(contrast1, contrast2);
  const maxC = Math.max(contrast1, contrast2);

  return {
    block1: c1,
    block2: c2,
    contrast1,
    contrast2,
    quality,
    score: (quality.critical ? 0 : 1000) + (minC * 100) + maxC,
    strategy
  };
}

function pickFromList(bg, list, strategyName) {
  const results = list.map(([a,b]) => evaluatePair(bg, a, b, strategyName));
  const nonCritical = results.filter(r => !r.quality.critical).sort((a,b) => b.score - a.score);
  if (nonCritical.length) return nonCritical[0];
  return results.sort((a,b) => b.score - a.score)[0];
}

function chooseRecommendation(bg) {
  const preferred = pickFromList(bg, PREFERRED, "Combinação preferencial");
  if (!preferred.quality.critical) return preferred;

  const alternative = pickFromList(bg, ALTERNATIVE, "Combinação alternativa");
  if (!alternative.quality.critical) return alternative;

  const mono = pickFromList(bg, MONO, "Solução monocromática");
  if (!mono.quality.critical) return mono;

  const all = [
    ...PREFERRED.map(([a,b]) => evaluatePair(bg, a, b, "Combinação preferencial")),
    ...ALTERNATIVE.map(([a,b]) => evaluatePair(bg, a, b, "Combinação alternativa")),
    ...MONO.map(([a,b]) => evaluatePair(bg, a, b, "Solução monocromática"))
  ].sort((a,b) => b.score - a.score);

  return {
    ...all[0],
    strategy: "Aplicação direta não recomendada"
  };
}

function updateUI(bg) {
  const rec = chooseRecommendation(bg);

  document.getElementById("previewBg").style.background = bg;
  document.getElementById("block1").setAttribute("fill", COLORS[rec.block1].hex);
  document.getElementById("block2").setAttribute("fill", COLORS[rec.block2].hex);

  document.getElementById("chip1").style.background = COLORS[rec.block1].hex;
  document.getElementById("chip2").style.background = COLORS[rec.block2].hex;

  document.getElementById("label1").textContent = `${COLORS[rec.block1].label} · ${COLORS[rec.block1].hex}`;
  document.getElementById("label2").textContent = `${COLORS[rec.block2].label} · ${COLORS[rec.block2].hex}`;

  document.getElementById("qualityLabel").textContent = rec.quality.label;
  document.getElementById("qualityBar").style.width = rec.quality.value + "%";
  document.getElementById("qualityBar").style.background = rec.quality.color;

  document.getElementById("contrastDetails").innerHTML = `
    <div>Bloco 1: <strong>${COLORS[rec.block1].label}</strong> · contraste <strong>${rec.contrast1.toFixed(2)}:1</strong></div>
    <div>Bloco 2: <strong>${COLORS[rec.block2].label}</strong> · contraste <strong>${rec.contrast2.toFixed(2)}:1</strong></div>
  `;

  const strategyBadge = document.getElementById("strategyBadge");
  const strategyText = document.getElementById("strategyText");
  strategyText.textContent = rec.strategy;
  strategyBadge.style.color = rec.quality.color;
  strategyBadge.style.background = rec.quality.critical ? "#fbe9e7" : "#f4f7ef";

  const note = document.getElementById("noteText");
  if (rec.strategy === "Aplicação direta não recomendada") {
    note.innerHTML = `Nenhuma combinação preferencial, alternativa ou monocromática saiu da zona crítica para este fundo. A recomendação aqui é <strong>não usar aplicação direta</strong>. Usa versão protegida, badge sólido ou intervenção no fundo.`;
  } else if (rec.strategy === "Solução monocromática") {
    note.innerHTML = `As combinações bicolor preferenciais e alternativas entraram em zona crítica. A melhor saída foi uma <strong>solução monocromática</strong>, porque evita um dos blocos abaixo da linha mínima de contraste.`;
  } else if (rec.quality.label === "Sensível") {
    note.innerHTML = `A combinação escolhida é usável, mas está numa zona sensível. Para peças pequenas, ecrãs de baixa qualidade ou contextos muito ruidosos, convém considerar versão protegida.`;
  } else {
    note.innerHTML = `A combinação escolhida respeita a hierarquia de marca e mantém leitura aceitável sem precisar de fallback estrutural.`;
  }
}

function analyze() {
  const hexInput = document.getElementById("hexInput");
  const colorInput = document.getElementById("colorInput");
  const bg = normalizeHex(hexInput.value);

  if (!isValidHex(bg)) {
    alert("Insere uma cor HEX válida, por exemplo: #3A7BD5");
    return;
  }

  hexInput.value = bg;
  colorInput.value = bg;
  updateUI(bg);
}

function buildSwatches() {
  const wrap = document.getElementById("swatches");
  QUICK_SWATCHES.forEach(hex => {
    const btn = document.createElement("button");
    btn.className = "swatch";
    btn.style.background = hex;
    btn.title = hex;
    btn.addEventListener("click", () => {
      document.getElementById("hexInput").value = hex;
      document.getElementById("colorInput").value = hex;
      updateUI(hex);
    });
    wrap.appendChild(btn);
  });
}

document.getElementById("runBtn").addEventListener("click", analyze);
document.getElementById("hexInput").addEventListener("keydown", e => {
  if (e.key === "Enter") analyze();
});
document.getElementById("colorInput").addEventListener("input", e => {
  const hex = normalizeHex(e.target.value);
  document.getElementById("hexInput").value = hex;
  updateUI(hex);
});

buildSwatches();
updateUI("#3A7BD5");
</script>
</body>
</html>
